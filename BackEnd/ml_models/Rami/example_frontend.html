<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection de Produit - DWH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 18px;
        }
        
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .product-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        
        .product-card.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .product-ref {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .product-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .product-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }
        
        .product-price {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .product-category {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .product-sales {
            font-size: 12px;
            color: #28a745;
            margin-top: 8px;
        }
        
        .selected-product {
            background: #f8f9ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .selected-product h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-label {
            font-weight: bold;
            color: #666;
        }
        
        .detail-value {
            color: #333;
        }
        
        .predictions {
            background: #fff;
            border: 2px solid #28a745;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .predictions h3 {
            color: #28a745;
            margin-bottom: 15px;
        }
        
        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8fff9;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .prediction-month {
            font-weight: bold;
            color: #333;
        }
        
        .prediction-qty {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Sélection de Produit - Data Warehouse</h1>
        <p class="subtitle">Recherchez un produit par nom ou référence, puis prédisez la demande</p>
        
        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Rechercher par nom ou référence (ex: Bourse, BLB)..."
                onkeypress="if(event.key==='Enter') searchProducts()"
            >
            <button onclick="searchProducts()">Rechercher</button>
            <button onclick="loadAllProducts()">Tous les produits</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">⏳ Chargement...</div>
        
        <div id="productsContainer"></div>
        
        <div id="selectedProduct" style="display: none;"></div>
        
        <div id="predictions" style="display: none;"></div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:5000/api';
        const TOKEN = localStorage.getItem('access_token') || 'YOUR_JWT_TOKEN_HERE';
        
        let selectedProduct = null;
        
        // Fonction pour afficher les erreurs
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // Fonction pour afficher le loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        // Rechercher des produits
        async function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            
            if (!searchTerm) {
                showError('Veuillez entrer un terme de recherche');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(
                    `${API_BASE}/ml/dwh/products?search=${encodeURIComponent(searchTerm)}&limit=20`,
                    {
                        headers: {
                            'Authorization': `Bearer ${TOKEN}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayProducts(data.products);
                
            } catch (error) {
                showError(`Erreur: ${error.message}`);
                console.error(error);
            } finally {
                showLoading(false);
            }
        }
        
        // Charger tous les produits
        async function loadAllProducts() {
            showLoading(true);
            
            try {
                const response = await fetch(
                    `${API_BASE}/ml/dwh/products?limit=50`,
                    {
                        headers: {
                            'Authorization': `Bearer ${TOKEN}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayProducts(data.products);
                
            } catch (error) {
                showError(`Erreur: ${error.message}`);
                console.error(error);
            } finally {
                showLoading(false);
            }
        }
        
        // Afficher les produits
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="no-results">Aucun produit trouvé</div>';
                return;
            }
            
            container.innerHTML = `
                <h2 style="margin-bottom: 20px; color: #333;">
                    ${products.length} produit(s) trouvé(s)
                </h2>
                <div class="products-grid">
                    ${products.map(product => `
                        <div class="product-card ${selectedProduct?.Id_Produit === product.Id_Produit ? 'selected' : ''}" 
                             onclick="selectProduct(${product.Id_Produit})">
                            <span class="product-ref">${product.Produit_Reference || 'N/A'}</span>
                            <div class="product-name">${product.Produit_Nom || 'Sans nom'}</div>
                            <div class="product-desc">${product.Produit_Description || 'Pas de description'}</div>
                            <div class="product-info">
                                <span class="product-price">${product.Produit_PU_HT?.toFixed(2) || '0.00'} TND</span>
                                <span class="product-category">${product.Produit_Categorie || 'N/A'}</span>
                            </div>
                            ${product.Nb_Ventes ? `<div class="product-sales">📊 ${product.Nb_Ventes} ventes</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Sélectionner un produit
        async function selectProduct(productId) {
            showLoading(true);
            
            try {
                const response = await fetch(
                    `${API_BASE}/ml/dwh/products/${productId}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${TOKEN}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                selectedProduct = data.product;
                
                displaySelectedProduct(data);
                
                // Mettre à jour l'affichage des cartes
                document.querySelectorAll('.product-card').forEach(card => {
                    card.classList.remove('selected');
                });
                event.currentTarget.classList.add('selected');
                
            } catch (error) {
                showError(`Erreur: ${error.message}`);
                console.error(error);
            } finally {
                showLoading(false);
            }
        }
        
        // Afficher le produit sélectionné
        function displaySelectedProduct(data) {
            const container = document.getElementById('selectedProduct');
            const product = data.product;
            const stats = data.statistics;
            
            container.style.display = 'block';
            container.innerHTML = `
                <h3>✅ Produit Sélectionné</h3>
                <div class="detail-row">
                    <span class="detail-label">Référence:</span>
                    <span class="detail-value">${product.Produit_Reference}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Nom:</span>
                    <span class="detail-value">${product.Produit_Nom}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Description:</span>
                    <span class="detail-value">${product.Produit_Description}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Prix HT:</span>
                    <span class="detail-value">${product.Produit_PU_HT?.toFixed(2)} TND</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Catégorie:</span>
                    <span class="detail-value">${product.Produit_Categorie}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total ventes:</span>
                    <span class="detail-value">${stats.Total_Quantite?.toFixed(0)} unités</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">CA Total:</span>
                    <span class="detail-value">${stats.Total_CA_HT?.toFixed(2)} TND</span>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button onclick="predictDemand()">📈 Prédire la Demande (3 mois)</button>
                </div>
            `;
        }
        
        // Prédire la demande
        async function predictDemand() {
            if (!selectedProduct) {
                showError('Veuillez sélectionner un produit');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(
                    `${API_BASE}/ml/rami/predict-demand`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            product_id: selectedProduct.Id_Produit,
                            product_reference: selectedProduct.Produit_Reference,
                            product_description: selectedProduct.Produit_Description,
                            product_pu_ht: selectedProduct.Produit_PU_HT
                        })
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                displayPredictions(data);
                
            } catch (error) {
                showError(`Erreur: ${error.message}`);
                console.error(error);
            } finally {
                showLoading(false);
            }
        }
        
        // Afficher les prédictions
        function displayPredictions(data) {
            const container = document.getElementById('predictions');
            
            container.style.display = 'block';
            container.className = 'predictions';
            container.innerHTML = `
                <h3>📊 Prédictions de Demande - ${data.product_reference}</h3>
                <p style="color: #666; margin-bottom: 15px; font-size: 14px;">
                    Modèle: ${data.model} | ${new Date(data.timestamp).toLocaleString('fr-FR')}
                </p>
                ${data.predictions.map(pred => `
                    <div class="prediction-item">
                        <span class="prediction-month">📅 ${pred.month}</span>
                        <span class="prediction-qty">${pred.quantity} unités</span>
                    </div>
                `).join('')}
            `;
            
            // Scroll vers les prédictions
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // Charger les produits au démarrage
        window.onload = () => {
            // Vérifier si le token est configuré
            if (TOKEN === 'YOUR_JWT_TOKEN_HERE') {
                showError('⚠️ Veuillez configurer votre token JWT dans le code (ligne 234)');
            }
        };
    </script>
</body>
</html>

<div class="login-container">
  <div class="login-background">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <img src="assets/images/LogoSougui.png" alt="Sougui Logo" class="login-logo" />
      </div>
      <h1 class="login-title">{{ translate.translate('login.title') }}</h1>
      <p class="login-subtitle">{{ translate.translate('login.subtitle') }}</p>
    </div>

    <div class="language-selector">
      <button 
        class="lang-btn" 
        [class.active]="translate.currentLanguage() === 'fr'"
        (click)="translate.setLanguage('fr')"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-2.29-2.333A17.9 17.9 0 0 1 8.027 13H4.062a8.008 8.008 0 0 0 5.648 6.667zM10.03 13c.151 2.439.848 4.73 1.97 6.752A15.905 15.905 0 0 0 13.97 13h-3.94zm9.908 0h-3.965a17.9 17.9 0 0 1-1.683 6.667A8.008 8.008 0 0 0 19.938 13zM4.062 11h3.965A17.9 17.9 0 0 1 9.71 4.333 8.008 8.008 0 0 0 4.062 11zm5.969 0h3.938A15.905 15.905 0 0 0 12 4.248 15.905 15.905 0 0 0 10.03 11zm4.259-6.667A17.9 17.9 0 0 1 15.973 11h3.965a8.008 8.008 0 0 0-5.648-6.667z"/>
        </svg>
        Français
      </button>
      <button 
        class="lang-btn" 
        [class.active]="translate.currentLanguage() === 'en'"
        (click)="translate.setLanguage('en')"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-2.29-2.333A17.9 17.9 0 0 1 8.027 13H4.062a8.008 8.008 0 0 0 5.648 6.667zM10.03 13c.151 2.439.848 4.73 1.97 6.752A15.905 15.905 0 0 0 13.97 13h-3.94zm9.908 0h-3.965a17.9 17.9 0 0 1-1.683 6.667A8.008 8.008 0 0 0 19.938 13zM4.062 11h3.965A17.9 17.9 0 0 1 9.71 4.333 8.008 8.008 0 0 0 4.062 11zm5.969 0h3.938A15.905 15.905 0 0 0 12 4.248 15.905 15.905 0 0 0 10.03 11zm4.259-6.667A17.9 17.9 0 0 1 15.973 11h3.965a8.008 8.008 0 0 0-5.648-6.667z"/>
        </svg>
        English
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (errorMessage()) {
        <div class="alert alert-error">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <div class="form-group">
        <label for="email" class="form-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          {{ translate.translate('login.email') }} <span class="required">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          class="form-control"
          placeholder="votre.email@sougui.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          {{ translate.translate('login.password') }} <span class="required">*</span>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          class="form-control"
          placeholder="••••••••"
          required
          minlength="6"
          autocomplete="current-password"
        />
      </div>

      <div class="forgot-password-link">
        <a routerLink="/forgot-password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
          {{ translate.translate('login.forgotPassword') }}
        </a>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-full"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="animate-spin">
            <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          {{ translate.translate('login.loading') }}
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          {{ translate.translate('login.submit') }}
        }
      </button>
    </form>

    <div class="login-footer">
      <p>{{ translate.translate('login.footer') }}</p>
    </div>
  </div>
</div>
